<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RaminDSGN</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  scroll-behavior: smooth;
  background: black;
}

/* Background video */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* Cinematic warm gradient overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(255,120,0,0.15),
    rgba(158, 124, 0, 0.09),
    rgba(0,0,0,1)
  );
  z-index: -1;
}

/* Fade animation */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* Scroll indicator */
.scroll-indicator {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
}

.scroll-track {
  width: 2px;
  height: 90px;
  background: rgba(255,255,255,0.15);
  overflow: hidden;
  position: relative;
  border-radius: 999px;
}

.scroll-light {
  position: absolute;
  width: 100%;
  height: 25px;
  background: white;
  top: -25px;
  animation: runway 2.2s linear infinite;
  border-radius: 999px;
}

@keyframes runway {
  0% { top: -25px; opacity: 0; }
  15% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* Smooth input focus */
input, textarea, select {
  outline: none;
  transition: border 0.3s ease, background 0.3s ease;
}

input:focus, textarea:focus, select:focus {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.03);
}
</style>
</head>

<body class="text-white">

<!-- Background Video -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="vid.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Hero -->
<section class="relative min-h-screen flex flex-col items-center justify-center text-center px-6">

  <h1 class="text-5xl md:text-7xl tracking-[0.5em] font-light fade">
    RAMINDSGN
  </h1>

  <p class="mt-6 text-xs tracking-[0.7em] text-white/60 fade">
    CREATIVES · STRATEGY · DESIGN
  </p>

  <div class="scroll-indicator" onclick="document.getElementById('links').scrollIntoView({behavior:'smooth'})">
    <div class="scroll-track">
      <div class="scroll-light"></div>
    </div>
  </div>

</section>

<!-- Links -->
<section id="links" class="bg-black py-32 px-6 flex flex-col items-center">

  <div class="grid md:grid-cols-3 gap-12 w-full max-w-5xl">

    <a href="https://ramindsgn.printify.me/" 
       target="_blank" 
       rel="noopener noreferrer"
       class="border border-white/20 rounded-md p-12 hover:border-white transition duration-500 fade">

      <h2 class="text-lg mb-4 tracking-widest font-light">Posters</h2>
    </a>

    <a href="https://instagram.com/ramin.dsgn" 
       target="_blank" 
       rel="noopener noreferrer"
       class="border border-white/20 rounded-md p-12 hover:border-white transition duration-500 fade">

      <h2 class="text-lg mb-4 tracking-widest font-light">Instagram</h2>
    </a>

    <a href="https://tiktok.com/@ramin.dsgn" 
       target="_blank" 
       rel="noopener noreferrer"
       class="border border-white/20 rounded-md p-12 hover:border-white transition duration-500 fade">

      <h2 class="text-lg mb-4 tracking-widest font-light">TikTok</h2>
    </a>

  </div>
</section>

<!-- Waitlist -->
<section class="bg-black py-32 px-6 flex justify-center">

  <div class="w-full max-w-3xl border border-white/20 rounded-md p-16 fade">

    <h2 class="text-xl text-center mb-12 tracking-widest font-light">
      MARKETING STRATEGY WAITLIST
    </h2>

    <form action="https://formsubmit.co/ramindsgn@gmail.com" method="POST" class="grid gap-6" target="_blank">

      <input type="hidden" name="_subject" value="Marketing Strategy Waitlist Application">
      <input type="hidden" name="_captcha" value="false">

      <input name="Name" required placeholder="Full Name"
        class="bg-transparent border border-white/20 rounded-sm p-4">

      <input name="Business" placeholder="Business Representing (if applicable)"
        class="bg-transparent border border-white/20 rounded-sm p-4">

      <input type="email" name="Email" required placeholder="Email"
        class="bg-transparent border border-white/20 rounded-sm p-4">

      <input name="Phone" placeholder="Phone"
        class="bg-transparent border border-white/20 rounded-sm p-4">

      <input name="Instagram" placeholder="Instagram Tag (if applicable)"
        class="bg-transparent border border-white/20 rounded-sm p-4">

      <select name="Preferred Contact Method"
        class="bg-black border border-white/20 rounded-sm p-4">
        <option>Email</option>
        <option>Phone</option>
        <option>Instagram</option>
      </select>

      <textarea name="Interest" required rows="4"
        placeholder="What got you interested in working with RaminDSGN?"
        class="bg-transparent border border-white/20 rounded-sm p-4"></textarea>

      <button type="submit"
        class="mt-6 border border-white rounded-sm py-4 tracking-widest hover:bg-white hover:text-black transition duration-500">
        JOIN WAITLIST
      </button>

    </form>
  </div>

</section>

<footer class="bg-black text-center text-white/40 text-xs pb-12 tracking-[0.4em]">
  © <script>document.write(new Date().getFullYear())</script> RaminDSGN <br>
  Toronto, ON
</footer>

<script>
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver((entries, obs) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    entry.target.classList.add('show');
    obs.unobserve(entry.target);
  });
}, { threshold: 0.2 });

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
